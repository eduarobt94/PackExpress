<!doctype html>
<html lang="es-UY">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#060810" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Fallback title/description (antes de React) -->
    <title>Pack Express Uruguay | Courier y Logística Nacional e Internacional</title>
    <meta name="description" content="Pack Express: courier y distribución en los 19 departamentos de Uruguay y envíos internacionales a +50 países. Recolección a domicilio en Montevideo." />

    <!-- Preconnect — acelera carga de fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <!-- Preconnect CDN Three.js texture -->
    <link rel="preconnect" href="https://s3-us-west-2.amazonaws.com" />

    <!-- Open Graph fallback -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="es_UY" />
    <meta property="og:site_name" content="Pack Express Uruguay" />
  </head>
