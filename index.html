<!doctype html>
<html lang="es-UY" style="background-color:#060810">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#FF6B00" />

    <!-- Favicon / PWA -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- ── Fallback estático para crawlers sin JS (GPTBot, ClaudeBot, bots sociales) ── -->
    <title>Pack Express Uruguay | Courier y Logística Nacional e Internacional</title>
    <meta name="description"
      content="Pack Express: courier y distribución en los 19 departamentos de Uruguay y envíos internacionales a +50 países. Recolección a domicilio en Montevideo. ¡Cotizá ahora!" />
    <meta name="robots"
      content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <link rel="canonical" href="https://packexpress.com.uy/" />

    <!-- Geolocalización -->
    <meta name="geo.region" content="UY-MO" />
    <meta name="geo.placename" content="Montevideo, Uruguay" />
    <meta name="geo.position" content="-34.907382;-56.188793" />
    <meta name="ICBM" content="-34.907382, -56.188793" />

    <!-- Open Graph — fallback completo para crawlers sin JS -->
    <meta property="og:type" content="website" />
    <meta property="og:title"
      content="Pack Express Uruguay | Courier y Logística Nacional e Internacional" />
    <meta property="og:description"
      content="Courier y distribución en los 19 departamentos de Uruguay y envíos internacionales a +50 países. Recolección a domicilio en Montevideo." />
    <meta property="og:url" content="https://packexpress.com.uy/" />
    <meta property="og:image" content="https://packexpress.com.uy/og-default.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"
      content="Pack Express Uruguay — Courier y Logística Internacional" />
    <meta property="og:locale" content="es_UY" />
    <meta property="og:site_name" content="Pack Express Uruguay" />

    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title"
      content="Pack Express Uruguay | Courier y Logística Nacional e Internacional" />
    <meta name="twitter:description"
      content="Courier y distribución en los 19 departamentos de Uruguay y envíos internacionales a +50 países." />
    <meta name="twitter:image" content="https://packexpress.com.uy/og-default.jpg" />
    <meta name="twitter:site" content="@packexpressuy" />

    <!-- Google Search Console — reemplazar content con el código de verificación de GSC -->
    <!-- <meta name="google-site-verification" content="PEGAR_CÓDIGO_GSC_AQUÍ" /> -->

    <!-- Preconnect — acelera carga de fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Three.js texture is self-hosted at /textures/worldMap.png -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
